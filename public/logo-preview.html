<!DOCTYPE html>
<html>
<head>
<title>P.E.T Logo Preview</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f8f8f8; padding: 40px; text-align: center; }
  h1 { color: #FF6B35; }
  .row { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin: 30px 0; }
  .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .card h3 { color: #666; margin-bottom: 16px; }
  .dark { background: #1D1D1F; }
  .sizes { display: flex; align-items: end; gap: 20px; justify-content: center; margin-top: 20px; }
  .sizes span { font-size: 11px; color: #999; }
</style>
</head>
<body>
  <h1>P.E.T 펫에토 로고 v3 Preview</h1>
  <p style="color:#888">10~30대 여성 타겟 | 통통 고양이 캐릭터 | 카카오프렌즈/몰랑 감성</p>

  <div class="row">
    <div class="card">
      <h3>아이콘 마크 (512x512)</h3>
      <img src="logo-pet.svg" width="200" height="200">
    </div>
    <div class="card dark">
      <h3 style="color:#aaa">다크 배경</h3>
      <img src="logo-pet.svg" width="200" height="200">
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>가로형 (헤더용)</h3>
      <img src="logo-pet-horizontal.svg" width="400">
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>파비콘 (다양한 크기)</h3>
      <div class="sizes">
        <div><img src="favicon-pet.svg" width="64" height="64"><br><span>64px</span></div>
        <div><img src="favicon-pet.svg" width="32" height="32"><br><span>32px</span></div>
        <div><img src="favicon-pet.svg" width="16" height="16"><br><span>16px</span></div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>앱 아이콘 시뮬레이션</h3>
      <div style="display:flex; gap:16px; justify-content:center; align-items:end">
        <div>
          <img src="logo-pet.svg" width="80" height="80" style="border-radius:18px; box-shadow:0 2px 8px rgba(0,0,0,0.15)">
          <p style="font-size:11px; color:#333; margin:4px 0 0">P.E.T</p>
        </div>
        <div>
          <div style="width:80px;height:80px;border-radius:18px;background:#FEE500;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15)">
            <span style="font-size:36px">💬</span>
          </div>
          <p style="font-size:11px; color:#333; margin:4px 0 0">카카오톡</p>
        </div>
        <div>
          <div style="width:80px;height:80px;border-radius:18px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15)">
            <span style="font-size:36px">📷</span>
          </div>
          <p style="font-size:11px; color:#333; margin:4px 0 0">Instagram</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
