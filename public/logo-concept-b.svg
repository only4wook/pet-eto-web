<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept B: "네거티브 스페이스" — 원 안에 고양이+강아지 프로필이 마주보는 형태 -->
  <!-- 영감: WWF 팬더 로고, FedEx 화살표 (숨겨진 형태의 발견) -->

  <!-- 배경 라운드 사각형 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#FF6B35"/>

  <!-- 중앙의 네거티브 스페이스: 고양이(왼)와 강아지(오)가 코를 맞대는 실루엣 -->
  <!-- 하나의 연결된 화이트 형태 -->
  <path d="
    M160 130
    C140 130, 130 100, 145 80
    L170 110
    C175 96, 185 90, 195 90
    L195 90
    C220 90, 240 110, 240 135
    L240 200
    C240 220, 245 240, 256 250
    C267 240, 272 220, 272 200
    L272 135
    C272 110, 292 90, 317 90
    L317 90
    C330 90, 345 100, 348 115
    C355 105, 370 115, 370 130
    C370 148, 352 155, 340 150
    C340 170, 320 175, 310 165
    L310 200
    C310 250, 290 290, 256 310
    C222 290, 202 250, 202 200
    L202 165
    C192 175, 172 170, 172 150
    C160 155, 142 148, 142 130
    C142 118, 150 130, 160 130Z
  " fill="#FFFFFF"/>

  <!-- 왼쪽 고양이 눈 -->
  <circle cx="218" cy="170" r="12" fill="#FF6B35"/>

  <!-- 오른쪽 강아지 눈 -->
  <circle cx="294" cy="170" r="12" fill="#FF6B35"/>

  <!-- 중앙 코 맞대기 — 작은 하트 -->
  <path d="M256 248 C256 248, 249 240, 245 243 C241 246, 241 252, 245 255 L256 264 L267 255 C271 252, 271 246, 267 243 C263 240, 256 248, 256 248Z" fill="#FF6B35"/>

  <!-- 하단 텍스트 공간에 발바닥 3개 점 -->
  <circle cx="224" cy="370" r="10" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="256" cy="360" r="10" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="288" cy="370" r="10" fill="#FFFFFF" opacity="0.5"/>
</svg>
