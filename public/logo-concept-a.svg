<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept A: "귀 하트" — 고양이 귀 + 강아지 귀가 합쳐져 하트를 형성 -->
  <!-- 영감: Airbnb 로고 (하트+장소=소속감), Apple 심플리시티 -->

  <!-- 배경 — 완벽한 원 -->
  <circle cx="256" cy="256" r="248" fill="#FF6B35"/>

  <!-- 하트 = 고양이 뾰족귀(왼쪽) + 강아지 접힌귀(오른쪽) -->
  <!-- 왼쪽: 고양이 귀 — 날카롭고 우아한 곡선 -->
  <path d="
    M256 400
    C256 400, 100 300, 100 210
    C100 140, 140 90, 190 90
    C230 90, 250 140, 256 170
  " fill="#FFFFFF"/>

  <!-- 오른쪽: 강아지 귀 — 둥글고 부드러운 곡선 -->
  <path d="
    M256 400
    C256 400, 412 300, 412 210
    C412 140, 372 90, 322 90
    C282 90, 262 140, 256 170
  " fill="#FFFFFF"/>

  <!-- 코 위치에 작은 발바닥 (하트 안쪽) -->
  <g transform="translate(230, 230)">
    <ellipse cx="26" cy="28" rx="16" ry="12" fill="#FF6B35"/>
    <circle cx="12" cy="14" r="7.5" fill="#FF6B35"/>
    <circle cx="26" cy="9" r="7.5" fill="#FF6B35"/>
    <circle cx="40" cy="14" r="7.5" fill="#FF6B35"/>
  </g>
</svg>
